name: CD

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .vscodeignore if missing
        run: |
          if [ ! -f .vscodeignore ]; then
            cat > .vscodeignore << 'EOF'
          .git
          .gitignore
          .github
          .vscode
          node_modules
          *.vsix
          vsc-extension-quickstart.md
          README.md
          CHANGELOG.md
          EOF
          fi

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(cat package.json | grep '"version"' | head -1 | awk -F'"' '{print $4}')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"

      - name: Package extension
        run: npx vsce package true

      - name: Publish to VS Code Marketplace
        run: |
          npx vsce publish --pat "${{ secrets.VSCODE_MARKETPLACE_TOKEN }}"
        env:
          VSCE_PAT: ${{ secrets.VSCODE_MARKETPLACE_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            *.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Azure (optional)
        if: always()
        run: |
          echo "Azure deployment can be configured here"
          echo "Version ${{ steps.version.outputs.version }} is ready for deployment"
