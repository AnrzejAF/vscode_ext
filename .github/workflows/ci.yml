name: CI

on:
  pull_request:
    branches: [ master ]
  push:
    branches: [ master ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate package.json
        run: node -e "require('./package.json'); console.log('package.json is valid JSON')"

      - name: Validate theme files
        run: |
          for theme in themes/*.json; do
            if [ -f "$theme" ]; then
              echo "Validating $theme..."
              node -e "require('./$theme'); console.log('$theme is valid')"
            fi
          done

      - name: Package extension
        run: npx vsce package
